apiVersion: apps/v1
kind: Deployment
metadata:
  name: krrad-target  
spec:
  replicas: 1 # Starts with 1 pod
  selector:
    matchLabels:
      app: krrad-target
  template:
    metadata:
      labels:
        app: krrad-target
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80