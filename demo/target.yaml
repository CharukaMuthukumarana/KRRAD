apiVersion: apps/v1
kind: Deployment
metadata:
  name: krrad-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krrad-target
  template:
    metadata:
      labels:
        app: krrad-target
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: krrad-target-svc
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app: krrad-target
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 32028
