apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: krrad-sensor
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: krrad-sensor
  template:
    metadata:
      labels:
        app: krrad-sensor
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: sensor
        image: krrad-sensor:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        env:
        - name: INTERFACE
          value: "bridge"
        - name: XDP_MODE
          value: "skb"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "🔧 Manual Setup: Linking Kernel Headers..."
          CURRENT_KERNEL=$(uname -r)
          INSTALLED_HEADERS=$(find /usr/src -maxdepth 1 -name "linux-headers-$CURRENT_KERNEL" -type d | head -n 1)
          if [ -z "$INSTALLED_HEADERS" ]; then
             INSTALLED_HEADERS=$(find /usr/src -maxdepth 1 -name "linux-headers-*" -type d | head -n 1)
          fi
          if [ -z "$INSTALLED_HEADERS" ]; then
             echo "❌ CRITICAL: No linux-headers found in /usr/src!"
             exit 1
          fi
          mkdir -p /lib/modules/$CURRENT_KERNEL
          rm -f /lib/modules/$CURRENT_KERNEL/build
          ln -s $INSTALLED_HEADERS /lib/modules/$CURRENT_KERNEL/build
          echo "🚀 Starting KRRAD Sensor..."
          python3 src/loader.py
        volumeMounts:
        - name: sys-fs-bpf
          mountPath: /sys/fs/bpf
        - name: usr-src
          mountPath: /usr/src
          readOnly: true
      volumes:
      - name: sys-fs-bpf
        hostPath:
          path: /sys/fs/bpf
      - name: usr-src
        hostPath:
          path: /usr/src
