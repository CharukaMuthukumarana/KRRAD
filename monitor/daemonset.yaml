# monitor/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: krrad-sensor
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: krrad-sensor
  template:
    metadata:
      labels:
        app: krrad-sensor
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: sensor
        image: charuka2002/krrad-sensor:v2.0-rc
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        env:
        - name: INTERFACE
          value: "bridge"
        # --- Manual Startup Command ---
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "🔧 Manual Setup: Linking Kernel Headers..."
          
          # 1. Identify the running kernel
          CURRENT_KERNEL=$(uname -r)
          echo "   Host Kernel: $CURRENT_KERNEL"
          
          # 2. Find the headers we installed in the image
          # (We look for any generic headers directory in /usr/src)
          INSTALLED_HEADERS=$(find /usr/src -maxdepth 1 -name "linux-headers-*-generic" -type d | head -n 1)
          
          if [ -z "$INSTALLED_HEADERS" ]; then
             echo "❌ CRITICAL: No linux-headers found in /usr/src!"
             echo "   Did the Docker build (v1.5) actually succeed?"
             ls -l /usr/src
             exit 1
          fi
          
          echo "   Found Headers: $INSTALLED_HEADERS"
          
          # 3. Create the Symlink
          mkdir -p /lib/modules/$CURRENT_KERNEL
          rm -f /lib/modules/$CURRENT_KERNEL/build
          ln -s $INSTALLED_HEADERS /lib/modules/$CURRENT_KERNEL/build
          echo "✅ Symlink created."
          
          # 4. Start the Sensor
          echo "🚀 Starting KRRAD Sensor..."
          python3 src/loader.py
        
        volumeMounts:
        - name: sys-fs-bpf
          mountPath: /sys/fs/bpf
      volumes:
      - name: sys-fs-bpf
        hostPath:
          path: /sys/fs/bpf