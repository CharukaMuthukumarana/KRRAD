# rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krrad-controller-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: krrad-controller-role
rules:
- apiGroups: ["apps", "extensions"]
  resources: ["deployments", "replicasets", "deployments/scale"]
  verbs: ["get", "list", "watch", "patch", "update", "scale"]
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: krrad-controller-binding
subjects:
- kind: ServiceAccount
  name: krrad-controller-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: krrad-controller-role
  apiGroup: rbac.authorization.k8s.io