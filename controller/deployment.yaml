apiVersion: apps/v1
kind: Deployment
metadata:
  name: krrad-controller
  labels:
    app: krrad-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krrad-controller
  template:
    metadata:
      labels:
        app: krrad-controller
    spec:
      serviceAccountName: krrad-controller-sa
      containers:
      - name: controller
        image: charuka2002/krrad-controller:4.1-rc
        imagePullPolicy: Always
        env:
        - name: SENSOR_URL
          value: "http://krrad-sensor.kube-system.svc.cluster.local:5000"
        - name: PROMETHEUS_URL
          value: "http://prometheus-service.monitoring.svc.cluster.local:9090"
        ports:
        - containerPort: 8080